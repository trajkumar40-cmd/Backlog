<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Backlog Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Backlog Dashboard</h1>

<input type="file" id="fileUpload" />

<!-- KPI Cards -->
<div class="cards">
    <div class="card">
        <h3>Backlog %</h3>
        <p id="backlogPercent">0%</p>
    </div>
    <div class="card">
        <h3>Total</h3>
        <p id="totalCases">0</p>
    </div>
    <div class="card">
        <h3>Open</h3>
        <p id="openCases">0</p>
    </div>
</div>

<!-- Aging Buckets -->
<h2>Aging Buckets</h2>
<div id="agingContainer"></div>

<!-- Engineer Backlog (Moved down) -->
<h2>Engineer Backlog</h2>
<table id="engTable">
<thead>
<tr>
<th>Engineer</th>
<th>Total</th>
<th>Open</th>
<th>%</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- Case Table -->
<h2>Cases > 50 Days</h2>
<table id="caseTable">
<thead>
<tr>
<th>CaseID</th>
<th>Date</th>
<th>Days</th>
<th>Status</th>
<th>Engineer</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="script.js"></script>

</body>
</html>
